# Foundation 모듈: OpenSearch — plain 단일노드 (dev, security 비활성).
# operator(opensearch-cluster.yaml)가 단일노드 docker-desktop에서 까다로워(약한 비번·bootstrap·CRD그룹) Phase 0 신뢰성 위해 plain 채택.
# discovery.type=single-node → bootstrap 파드 불요·즉시 형성. DISABLE_SECURITY_PLUGIN → 평문 HTTP(내부 전용).
# 향후 provisioning 모델(OpenSearchIndexClaim)은 설치된 opensearch-operator로 승격 가능.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensphere-search
  namespace: opensphere-foundation
  labels:
    opensphere.io/foundation-module: opensearch
spec:
  serviceName: opensphere-search
  replicas: 1
  selector:
    matchLabels:
      app: opensphere-search
  template:
    metadata:
      labels:
        app: opensphere-search
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
          securityContext:
            privileged: true
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.17.0
          env:
            - { name: cluster.name, value: opensphere-search }
            - { name: node.name, value: opensphere-search-0 }
            - { name: discovery.type, value: single-node }
            - { name: DISABLE_SECURITY_PLUGIN, value: "true" }
            - { name: DISABLE_INSTALL_DEMO_CONFIG, value: "true" }
            - { name: bootstrap.memory_lock, value: "false" }
            - { name: OPENSEARCH_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports:
            - { name: http, containerPort: 9200 }
            - { name: transport, containerPort: 9300 }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /_cluster/health, port: 9200 }
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          volumeMounts:
            - { name: data, mountPath: /usr/share/opensearch/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-search
  namespace: opensphere-foundation
  labels:
    opensphere.io/foundation-module: opensearch
spec:
  selector:
    app: opensphere-search
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
    - { name: transport, port: 9300, targetPort: 9300 }
