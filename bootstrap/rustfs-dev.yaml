# Foundation 모듈: RustFS — S3 호환 object storage (dev, 단일노드). MinIO 대안(Rust).
# https://github.com/rustfs/rustfs/releases/tag/1.0.0-beta.8
# 포트 9000=S3 API · 9001=Web 콘솔. non-root UID/GID 10001(데이터 경로 쓰기 가능해야 함 → fsGroup).
# ⚠️ beta에서 creds env가 무시되는 사례(이슈 #1058/#375) → 기본값 rustfsadmin/rustfsadmin과 일치시켜 소비계약 정확. prod는 override.
# 향후 provisioning(BucketClaim)은 S3 API로 버킷 발급. 콘솔(:9001)은 RustFS 자체 UI.
---
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: opensphere-foundation
  labels: { opensphere.io/foundation-module: rustfs }
type: Opaque
stringData:
  access_key: rustfsadmin
  secret_key: rustfsadmin
  endpoint: opensphere-rustfs.opensphere-foundation.svc:9000
---
apiVersion: v1
kind: Service
metadata:
  name: opensphere-rustfs
  namespace: opensphere-foundation
  labels: { opensphere.io/foundation-module: rustfs }
spec:
  selector:
    app: opensphere-rustfs
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensphere-rustfs
  namespace: opensphere-foundation
  labels: { opensphere.io/foundation-module: rustfs }
spec:
  serviceName: opensphere-rustfs
  replicas: 1
  selector:
    matchLabels:
      app: opensphere-rustfs
  template:
    metadata:
      labels:
        app: opensphere-rustfs
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        runAsNonRoot: true
      containers:
        - name: rustfs
          # image-source: ghcr-mirror(ok) origin=rustfs/rustfs:1.0.0-beta.8 — [[ghcr-image-mirror-policy]]
          image: ghcr.io/opensphere-platform/mirror/rustfs:1.0.0-beta.8
          imagePullPolicy: IfNotPresent
          env:
            - { name: RUSTFS_VOLUMES, value: "/data" }
            - { name: RUSTFS_ADDRESS, value: "0.0.0.0:9000" }
            - { name: RUSTFS_CONSOLE_ADDRESS, value: "0.0.0.0:9001" }
            - { name: RUSTFS_CONSOLE_ENABLE, value: "true" }
            - { name: RUSTFS_ACCESS_KEY, valueFrom: { secretKeyRef: { name: rustfs-credentials, key: access_key } } }
            - { name: RUSTFS_SECRET_KEY, valueFrom: { secretKeyRef: { name: rustfs-credentials, key: secret_key } } }
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "1Gi" }
          readinessProbe:
            tcpSocket: { port: s3 }
            initialDelaySeconds: 8
            periodSeconds: 8
            failureThreshold: 12
          livenessProbe:
            tcpSocket: { port: s3 }
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources: { requests: { storage: 10Gi } }
