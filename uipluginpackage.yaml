# Foundation — OpenSphere subShell (SDK 표준 빈 골격). _skeleton에서 인스턴스화.
# manifest.sha256는 서명 핀 — 서명 시 자동 갱신.
# 감사 시정 S1(2026-07-06): image.digest는 sha256 필수(태그 금지, CRD pattern + controller InvalidDigest 이중 강제).
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginPackage
metadata:
  name: foundation
  namespace: opensphere-console
spec:
  kind: subShell
  hostRef: main
  hostApiVersion: "1.0.0"
  hostCompat: ">=1.0.0 <2.0.0"
  displayName: "Platform Foundation Service Stack"
  owner: opensphere-platform
  version: 0.2.0-edge.9
  description: "OpenSphere PFS lifecycle and foundation service module host; may be staged before Platform Support Profile admission."
  serviceAccountName: opensphere-foundation
  image:
    repository: ghcr.io/opensphere-platform/opensphere-shell-foundation
    digest: sha256:a87bec7344fd41f15315333880c74c56de912bb6e795b30169bdb08e9c6831cd
  nav:
    band: "운영 Operate"
    label: "Foundation"
  manifest:
    path: /plugins/ui-shell.manifest.json
    sha256: "19ba289955e72c3584d625ee235f35258a8e6bd8af04442dca4203dda06a1fb8"
    signaturePath: /plugins/ui-shell.manifest.json.sig
  trust:
    keyId: opensphere-plugins-v1
  shellCompat: ">=0.2.0 <0.9.0"
  permissions:
    - page:register
    - api:proxy
    - manual:contribute
  api:
    basePath: /api/plugins/foundation
  contributions:
    page: { enabled: true }
    navigation: { enabled: false, mode: none, reason: "Foundation owns navigation inside its page" }
    api: { enabled: true, basePath: /api/plugins/foundation }
    cli: { enabled: false, reason: "Foundation CLI manifest is not published" }
    manual: { enabled: true, sourceId: "plugin:foundation", mode: runtime }
    search: { enabled: false, mode: none, reason: "Foundation search is page-local" }
    notification: { enabled: true, frontend: false, backend: true }
    observability: { enabled: true, logs: true, metrics: false, traces: false, reason: "Metrics and traces are pending; structured logs are available" }
---
apiVersion: plugins.opensphere.io/v1alpha1
kind: UIPluginRegistration
metadata:
  name: foundation
  namespace: opensphere-console
spec:
  packageRef:
    name: foundation
  desiredState: Enabled
  installPolicy:
    createWorkload: true
    createProxyRoute: false
    exposeInNavigation: false
  approval:
    requestedBy: cmars
    reason: "Stage the PFS subShell before Platform Support Profile admission"
