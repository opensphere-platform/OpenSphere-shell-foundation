name: Promote atomic Foundation release channel

on:
  workflow_dispatch:
    inputs:
      source_channel: { required: true, type: choice, options: [edge, candidate] }
      target_channel: { required: true, type: choice, options: [candidate, stable] }
      expected_source_revision: { required: true, type: string }
      conformance_evidence:
        description: Immutable clean-install and upgrade E2E evidence URL
        required: true
        type: string
      rollback_evidence:
        description: Immutable rollback and backup/restore evidence URL
        required: true
        type: string
      approval_reason:
        description: QA/release approval reason (12+ characters)
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: foundation-channel-promotion
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/opensphere-platform

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.release.outputs.matrix }}
    steps:
      - name: Validate ordered promotion and evidence inputs
        env:
          SOURCE: ${{ inputs.source_channel }}
          TARGET: ${{ inputs.target_channel }}
          REVISION: ${{ inputs.expected_source_revision }}
          CONFORMANCE: ${{ inputs.conformance_evidence }}
          ROLLBACK: ${{ inputs.rollback_evidence }}
          REASON: ${{ inputs.approval_reason }}
        run: |
          set -euo pipefail
          test "$SOURCE:$TARGET" = "edge:candidate" -o "$SOURCE:$TARGET" = "candidate:stable"
          [[ "$REVISION" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CONFORMANCE" =~ ^https://github.com/opensphere-platform/[^/]+/actions/runs/[0-9]+([/?].*)?$ ]]
          [[ "$ROLLBACK" =~ ^https://github.com/opensphere-platform/[^/]+/actions/runs/[0-9]+([/?].*)?$ ]]
          test "${#REASON}" -ge 12
      - uses: imjasonh/setup-crane@v0.4
      - name: Login to GHCR
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: crane auth login ghcr.io -u "${{ github.actor }}" -p "$GH_TOKEN"
      - id: release
        name: Resolve one exact signed source Foundation BOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ inputs.source_channel }}
          REVISION: ${{ inputs.expected_source_revision }}
        run: |
          set -euo pipefail
          anchor_repo="$REGISTRY/opensphere-shell-foundation"
          anchor_digest="$(crane digest "$anchor_repo:$SOURCE")"
          gh attestation verify "oci://$anchor_repo@$anchor_digest" --bundle-from-oci \
            --repo opensphere-platform/OpenSphere-shell-foundation \
            --signer-workflow opensphere-platform/OpenSphere-shell-foundation/.github/workflows/publish-image.yml \
            --cert-oidc-issuer https://token.actions.githubusercontent.com --source-ref refs/heads/main \
            --deny-self-hosted-runners --predicate-type https://opensphere.io/attestations/foundation-release-bom/v1 \
            --format json > "$RUNNER_TEMP/foundation-bom-attestations.json"
          jq -e --arg source "$SOURCE" --arg revision "$REVISION" --arg anchor "$anchor_repo@$anchor_digest" \
            '[.[].verificationResult.statement.predicate |
              select(.channel == $source and .sourceRevision == $revision and .components.shell.image == $anchor)] |
              unique | if length == 1 then .[0] else error("one exact source Foundation BOM is required") end' \
            "$RUNNER_TEMP/foundation-bom-attestations.json" > "$RUNNER_TEMP/source-foundation-bom.json"
          jq -e '.apiVersion == "foundation.release.opensphere.io/v1alpha1" and
            .kind == "OpenSphereFoundationReleaseBOM" and .status == "Active" and
            .supportedPlatforms == ["linux/amd64","linux/arm64"] and
            (.components | length) == 23 and (.operands | length) == 28' \
            "$RUNNER_TEMP/source-foundation-bom.json" >/dev/null

          for key in $(jq -r '.components | keys[] | select(. != "samba-ad")' "$RUNNER_TEMP/source-foundation-bom.json"); do
            repository="$(jq -r --arg key "$key" '.components[$key].repository' "$RUNNER_TEMP/source-foundation-bom.json")"
            expected="$(jq -r --arg key "$key" '.components[$key].image | split("@")[1]' "$RUNNER_TEMP/source-foundation-bom.json")"
            test "$(crane digest "$REGISTRY/$repository:$SOURCE")" = "$expected"
          done
          for key in $(jq -r '.operands | keys[]' "$RUNNER_TEMP/source-foundation-bom.json"); do
            repository="$(jq -r --arg key "$key" '.operands[$key].repository' "$RUNNER_TEMP/source-foundation-bom.json")"
            expected="$(jq -r --arg key "$key" '.operands[$key].image | split("@")[1]' "$RUNNER_TEMP/source-foundation-bom.json")"
            test "$(crane digest "$REGISTRY/$repository:$SOURCE")" = "$expected"
          done

          matrix="$(jq -c '{include:
            ([.components | to_entries[] | {key:.key,category:"component",repository:.value.repository,image:.value.image}] +
             [.operands | to_entries[] | {key:.key,category:"operand",repository:.value.repository,image:.value.image}])}' \
            "$RUNNER_TEMP/source-foundation-bom.json")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: source-foundation-bom
          path: ${{ runner.temp }}/source-foundation-bom.json
          retention-days: 365

  scan:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Bind scan to the exact BOM image
        shell: bash
        env:
          KEY: ${{ matrix.key }}
          CATEGORY: ${{ matrix.category }}
          REPOSITORY: ${{ matrix.repository }}
          IMAGE: ${{ matrix.image }}
          REVISION: ${{ inputs.expected_source_revision }}
        run: |
          set -euo pipefail
          digest="${IMAGE##*@}"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          jq -n --arg key "$KEY" --arg category "$CATEGORY" --arg repository "$REPOSITORY" \
            --arg image "$IMAGE" --arg digest "$digest" --arg revision "$REVISION" \
            '{schemaVersion:1,key:$key,category:$category,repository:$repository,image:$image,digest:$digest,sourceRevision:$revision}' \
            > "$RUNNER_TEMP/$CATEGORY-$KEY-scan-binding.json"
      - name: Candidate/stable vulnerability and license gate
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: ${{ matrix.image }}
          scanners: vuln,license
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: json
          output: ${{ runner.temp }}/${{ matrix.category }}-${{ matrix.key }}-trivy.json
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.category }}-${{ matrix.key }}-${{ inputs.source_channel }}-to-${{ inputs.target_channel }}-scan
          path: |
            ${{ runner.temp }}/${{ matrix.category }}-${{ matrix.key }}-scan-binding.json
            ${{ runner.temp }}/${{ matrix.category }}-${{ matrix.key }}-trivy.json
          retention-days: 365

  promote:
    needs: [prepare, scan]
    environment: opensphere-${{ inputs.target_channel }}-promotion
    runs-on: ubuntu-latest
    steps:
      - uses: imjasonh/setup-crane@v0.4
      - name: Login to GHCR
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        run: crane auth login ghcr.io -u "${{ github.actor }}" -p "$GH_TOKEN"
      - uses: actions/download-artifact@v4
        with:
          name: source-foundation-bom
          path: ${{ runner.temp }}/source-bom
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-${{ inputs.source_channel }}-to-${{ inputs.target_channel }}-scan'
          path: ${{ runner.temp }}/scan-evidence
          merge-multiple: true
      - id: verify
        name: Rebind scans and verify provenance, SBOM and platforms
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ inputs.source_channel }}
          TARGET: ${{ inputs.target_channel }}
          REVISION: ${{ inputs.expected_source_revision }}
        run: |
          set -euo pipefail
          bom="$RUNNER_TEMP/source-bom/source-foundation-bom.json"
          for category in component operand; do
            object="${category}s"
            for key in $(jq -r --arg object "$object" '.[$object] | keys[]' "$bom"); do
              repository="$(jq -r --arg object "$object" --arg key "$key" '.[$object][$key].repository' "$bom")"
              image="$(jq -r --arg object "$object" --arg key "$key" '.[$object][$key].image' "$bom")"
              digest="${image##*@}"
              binding="$RUNNER_TEMP/scan-evidence/$category-$key-scan-binding.json"
              report="$RUNNER_TEMP/scan-evidence/$category-$key-trivy.json"
              test -s "$binding"; test -s "$report"
              jq -e --arg key "$key" --arg category "$category" --arg repository "$repository" \
                --arg image "$image" --arg digest "$digest" --arg revision "$REVISION" \
                '.schemaVersion == 1 and .key == $key and .category == $category and
                 .repository == $repository and .image == $image and .digest == $digest and .sourceRevision == $revision' \
                "$binding" >/dev/null
              test "$(crane digest "$image")" = "$digest"

              if test "$category" = component; then
                platforms='["linux/amd64","linux/arm64"]'
              else
                platforms="$(jq -c --arg key "$key" '.operands[$key].platforms' "$bom")"
              fi
              manifest="$(crane manifest "$image")"
              for platform in $(jq -r '.[]' <<<"$platforms"); do
                os="${platform%/*}"; architecture="${platform#*/}"
                jq -e --arg os "$os" --arg architecture "$architecture" \
                  '.manifests[] | select(.platform.os == $os and .platform.architecture == $architecture)' \
                  <<<"$manifest" >/dev/null
              done

              if test "$category" = operand; then
                repo='opensphere-platform/OpenSphere-shell-foundation'
                signer='opensphere-platform/OpenSphere-shell-foundation/.github/workflows/sync-mirror-images.yml'
              elif test "$key" = samba-ad; then
                repo='opensphere-platform/OpenSphere-plugin-samba-ad'
                signer='opensphere-platform/OpenSphere-plugin-samba-ad/.github/workflows/publish-image.yml'
              else
                repo='opensphere-platform/OpenSphere-shell-foundation'
                signer='opensphere-platform/OpenSphere-shell-foundation/.github/workflows/publish-image.yml'
              fi
              gh attestation verify "oci://$image" --bundle-from-oci --repo "$repo" --signer-workflow "$signer" \
                --cert-oidc-issuer https://token.actions.githubusercontent.com --source-ref refs/heads/main \
                --deny-self-hosted-runners --predicate-type https://slsa.dev/provenance/v1 >/dev/null
              gh attestation verify "oci://$image" --bundle-from-oci --repo "$repo" --signer-workflow "$signer" \
                --cert-oidc-issuer https://token.actions.githubusercontent.com --source-ref refs/heads/main \
                --deny-self-hosted-runners --predicate-type https://spdx.dev/Document/v2.3 >/dev/null
            done
          done

          samba_image="$(jq -r '.components["samba-ad"].image' "$bom")"
          test "$(crane digest "$REGISTRY/opensphere-plugin-samba-ad:$TARGET")" = "${samba_image##*@}"
          jq --arg target "$TARGET" '.channel=$target | .operands |= with_entries(.value.channel=$target)' "$bom" \
            > "$RUNNER_TEMP/target-foundation-bom.json"
          echo "anchor-digest=$(jq -r '.components.shell.image | split("@")[1]' "$bom")" >> "$GITHUB_OUTPUT"
      - name: Attest target Foundation Release BOM
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/opensphere-shell-foundation
          subject-digest: ${{ steps.verify.outputs.anchor-digest }}
          predicate-type: https://opensphere.io/attestations/foundation-release-bom/v1
          predicate-path: ${{ runner.temp }}/target-foundation-bom.json
          push-to-registry: true
      - name: Create append-only promotion ledger
        env:
          DIGEST: ${{ steps.verify.outputs.anchor-digest }}
          SOURCE: ${{ inputs.source_channel }}
          TARGET: ${{ inputs.target_channel }}
          REVISION: ${{ inputs.expected_source_revision }}
          CONFORMANCE: ${{ inputs.conformance_evidence }}
          ROLLBACK: ${{ inputs.rollback_evidence }}
          REASON: ${{ inputs.approval_reason }}
        run: |
          jq -n --arg digest "$DIGEST" --arg actor "$GITHUB_ACTOR" --arg from "$SOURCE" --arg to "$TARGET" \
            --arg revision "$REVISION" --arg approvedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --arg reason "$REASON" \
            --arg run "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg conformance "$CONFORMANCE" --arg rollback "$ROLLBACK" \
            '{schemaVersion:1,image:"ghcr.io/opensphere-platform/opensphere-shell-foundation",sourceDigest:$digest,actor:$actor,fromChannel:$from,toChannel:$to,sourceRevision:$revision,approvedAt:$approvedAt,approvalReason:$reason,evidenceRefs:[$run,$conformance,$rollback],gates:{foundationBom:true,multiArchitecture:true,provenance:true,sbom:true,vulnerabilityLicense:true,cleanInstallUpgrade:true,rollbackBackupRestore:true}}' \
            > "$RUNNER_TEMP/promotion.json"
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/opensphere-shell-foundation
          subject-digest: ${{ steps.verify.outputs.anchor-digest }}
          predicate-type: https://opensphere.io/attestations/channel-promotion/v1
          predicate-path: ${{ runner.temp }}/promotion.json
          push-to-registry: true
      - name: Promote exact digests with Foundation shell anchor last
        env: { TARGET: "${{ inputs.target_channel }}" }
        run: |
          set -euo pipefail
          bom="$RUNNER_TEMP/target-foundation-bom.json"
          for key in $(jq -r '.operands | keys[]' "$bom"); do
            crane tag "$(jq -r --arg key "$key" '.operands[$key].image' "$bom")" "$TARGET"
          done
          for key in $(jq -r '.components | keys[] | select(. != "shell" and . != "samba-ad")' "$bom"); do
            crane tag "$(jq -r --arg key "$key" '.components[$key].image' "$bom")" "$TARGET"
          done
          crane tag "$(jq -r '.components.shell.image' "$bom")" "$TARGET"

          for object in operands components; do
            for key in $(jq -r --arg object "$object" '.[$object] | keys[] | select(. != "samba-ad")' "$bom"); do
              repository="$(jq -r --arg object "$object" --arg key "$key" '.[$object][$key].repository' "$bom")"
              expected="$(jq -r --arg object "$object" --arg key "$key" '.[$object][$key].image | split("@")[1]' "$bom")"
              test "$(crane digest "$REGISTRY/$repository:$TARGET")" = "$expected"
            done
          done
