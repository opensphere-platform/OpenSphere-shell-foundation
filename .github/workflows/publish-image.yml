name: Publish atomic Foundation edge release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - server.js
      - package.json
      - package-lock.json
      - angular.json
      - src/**
      - ui-shell/**
      - module-package.json
      - module-package.json.sig
      - backend/control-plane/**
      - deploy/**
      - plugins/**
      - tools/**
      - oci/**
      - .github/scripts/**
      - .github/workflows/publish-image.yml

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  # v2 rotates the lease after a GitHub-hosted QEMU runner ignored both the
  # normal and force-cancel requests. A cancelled v1 run cannot reach the
  # atomic publish-edge job; all current releases remain serialized here.
  group: foundation-edge-images-v2
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io/opensphere-platform
  SIGNER_WORKFLOW: opensphere-platform/OpenSphere-shell-foundation/.github/workflows/publish-image.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-plugin-samba-ad
          path: deps/OpenSphere-plugin-samba-ad
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify:manual
      - run: npm run verify:surface
        env:
          SAMBA_PLUGIN_ROOT: deps/OpenSphere-plugin-samba-ad
      - run: npm run verify:plugin-catalog
      - run: npm run test:plugin-runtime
      - run: npm run build
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/control-plane/go.mod
      - working-directory: backend/control-plane
        run: go test ./...

  prepare:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.plugins.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: plugins
        shell: bash
        run: |
          set -euo pipefail
          value="$(jq -c '{include:[.plugins[] | {id:.id,image:("opensphere-plugin-" + .id)}]}' plugins/catalog.json)"
          test "$(jq '.include | length' <<<"$value")" = 20
          echo "value=$value" >> "$GITHUB_OUTPUT"

  publish-shell:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-SDK
          path: OpenSphere-SDK
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Recreate signed Foundation subShell package
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.DUPA_SIGNING_KEY_PEM }}
          DUPA_SIGNING_KEY_ID: opensphere-plugins-v4
          OPENSPHERE_SDK: ${{ github.workspace }}/OpenSphere-SDK
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          printf '%s' "$SIGNING_KEY" > "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          chmod 600 "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          export DUPA_SIGNING_KEY="$RUNNER_TEMP/opensphere-plugins-v4.pem"
          npm --prefix OpenSphere-SDK install --no-audit --no-fund
          npm --prefix OpenSphere-SDK run build
          npm run package:module
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: package
        shell: bash
        run: |
          descriptor="$(jq -c . module-package.json)"
          descriptor_build_arg="$(printf 'OS_MODULE_DESCRIPTOR=%s' "$descriptor" | jq -Rr '[.] | @csv')"
          echo "descriptor-build-arg=$descriptor_build_arg" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version module-package.json)" >> "$GITHUB_OUTPUT"
          echo "signature=$(tr -d '\r\n' < module-package.json.sig)" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/opensphere-shell-foundation
          tags: type=sha,prefix=sha-
          labels: |
            io.opensphere.channel=edge
            io.opensphere.source-revision=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.package.outputs.version }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ steps.package.outputs.descriptor-build-arg }}
            OS_MODULE_SIGNATURE=${{ steps.package.outputs.signature }}
          provenance: mode=max
          cache-from: type=gha,scope=opensphere-shell-foundation
          cache-to: type=gha,mode=max,scope=opensphere-shell-foundation
      - uses: imjasonh/setup-crane@v0.4
      - name: Authenticate crane to private GHCR packages
        env: { GHCR_TOKEN: "${{ secrets.GHCR_PAT }}" }
        run: crane auth login ghcr.io -u "opensphere-platform" -p "$GHCR_TOKEN"
      - name: Verify signed module labels survive OCI serialization
        run: bash .github/scripts/verify-module-label.sh "${{ env.REGISTRY }}/opensphere-shell-foundation@${{ steps.build.outputs.digest }}" "${{ steps.package.outputs.version }}"
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/opensphere-shell-foundation
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.REGISTRY }}/opensphere-shell-foundation@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/opensphere-shell-foundation.spdx.json
          upload-artifact: false
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/opensphere-shell-foundation
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ runner.temp }}/opensphere-shell-foundation.spdx.json
          push-to-registry: true

  publish-control-plane:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/foundation-control-plane
          tags: type=sha,prefix=sha-
          labels: |
            io.opensphere.channel=edge
            io.opensphere.source-revision=${{ github.sha }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: backend/control-plane
          file: backend/control-plane/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          cache-from: type=gha,scope=foundation-control-plane
          cache-to: type=gha,mode=max,scope=foundation-control-plane
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/foundation-control-plane
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.REGISTRY }}/foundation-control-plane@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/foundation-control-plane.spdx.json
          upload-artifact: false
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/foundation-control-plane
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ runner.temp }}/foundation-control-plane.spdx.json
          push-to-registry: true

  publish-plugins:
    needs: [test, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: opensphere-platform/OpenSphere-SDK
          path: OpenSphere-SDK
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - name: Create signed independent plugin package
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.DUPA_SIGNING_KEY_PEM }}
          DUPA_SIGNING_KEY_ID: opensphere-plugins-v4
          OPENSPHERE_SDK: ${{ github.workspace }}/OpenSphere-SDK
          PLUGIN_ID: ${{ matrix.id }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          printf '%s' "$SIGNING_KEY" > "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          chmod 600 "$RUNNER_TEMP/opensphere-plugins-v4.pem"
          export DUPA_SIGNING_KEY="$RUNNER_TEMP/opensphere-plugins-v4.pem"
          npm --prefix OpenSphere-SDK install --no-audit --no-fund
          npm --prefix OpenSphere-SDK run build
          node tools/package-foundation-plugin.mjs --id "$PLUGIN_ID"
          node --check "plugins/generated/$PLUGIN_ID/ui-shell.plugin.js"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
      - id: package
        shell: bash
        env: { PLUGIN_ID: "${{ matrix.id }}" }
        run: |
          descriptor="$(jq -c . "plugins/generated/$PLUGIN_ID/module-package.json")"
          descriptor_build_arg="$(printf 'OS_MODULE_DESCRIPTOR=%s' "$descriptor" | jq -Rr '[.] | @csv')"
          echo "descriptor-build-arg=$descriptor_build_arg" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r .version "plugins/generated/$PLUGIN_ID/module-package.json")" >> "$GITHUB_OUTPUT"
          echo "signature=$(tr -d '\r\n' < "plugins/generated/$PLUGIN_ID/module-package.json.sig")" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: type=sha,prefix=sha-
          labels: |
            io.opensphere.channel=edge
            io.opensphere.source-revision=${{ github.sha }}
            io.opensphere.foundation.plugin-id=${{ matrix.id }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.package.outputs.version }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: plugins/runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PLUGIN_ID=${{ matrix.id }}
            ${{ steps.package.outputs.descriptor-build-arg }}
            OS_MODULE_SIGNATURE=${{ steps.package.outputs.signature }}
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - uses: imjasonh/setup-crane@v0.4
      - name: Authenticate crane to private GHCR packages
        env: { GHCR_TOKEN: "${{ secrets.GHCR_PAT }}" }
        run: crane auth login ghcr.io -u "opensphere-platform" -p "$GHCR_TOKEN"
      - name: Verify signed module labels survive OCI serialization
        run: bash .github/scripts/verify-module-label.sh "${{ env.REGISTRY }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}" "${{ steps.package.outputs.version }}"
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.REGISTRY }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ runner.temp }}/${{ matrix.image }}.spdx.json
          upload-artifact: false
      - uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ runner.temp }}/${{ matrix.image }}.spdx.json
          push-to-registry: true

  publish-edge:
    needs: [prepare, publish-shell, publish-control-plane, publish-plugins]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: imjasonh/setup-crane@v0.4
      - name: Login to GHCR
        env: { GHCR_TOKEN: "${{ secrets.GHCR_PAT }}" }
        run: crane auth login ghcr.io -u "opensphere-platform" -p "$GHCR_TOKEN"
      - id: release
        name: Verify exact artifacts and create Foundation BOM
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHELL_DIGEST: ${{ needs.publish-shell.outputs.digest }}
          CONTROL_PLANE_DIGEST: ${{ needs.publish-control-plane.outputs.digest }}
        run: |
          set -euo pipefail
          source_tag="sha-${GITHUB_SHA:0:7}"
          release_epoch="$(git show -s --format=%ct "$GITHUB_SHA")"
          release_tag="$(TZ=Asia/Seoul date -d "@$release_epoch" +%Y%m%d%H%M)"
          [[ "$release_tag" =~ ^[0-9]{12}$ ]]
          jq -n --arg revision "$GITHUB_SHA" --arg releaseTag "$release_tag" '{
            apiVersion:"foundation.release.opensphere.io/v1alpha1",
            kind:"OpenSphereFoundationReleaseBOM",
            channel:"edge",
            status:"Active",
            releaseTag:$releaseTag,
            hostRef:"foundation",
            sourceRevision:$revision,
            supportedPlatforms:["linux/amd64","linux/arm64"],
            components:{},
            operands:{}
          }' > "$RUNNER_TEMP/foundation-bom.json"

          verify_custom_image() {
            local key="$1" repository="$2" expected_digest="$3" role="$4"
            local ref="$REGISTRY/$repository:$source_tag" digest manifest revision
            digest="$(crane digest "$ref")"
            test "$digest" = "$expected_digest"
            manifest="$(crane manifest "$REGISTRY/$repository@$digest")"
            for architecture in amd64 arm64; do
              platform_digest="$(jq -er --arg arch "$architecture" '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $arch) | .digest' <<<"$manifest")"
              revision="$(crane config "$REGISTRY/$repository@$platform_digest" | jq -r '.config.Labels["io.opensphere.source-revision"] // empty')"
              test "$revision" = "$GITHUB_SHA"
            done
            gh attestation verify "oci://$REGISTRY/$repository@$digest" --bundle-from-oci \
              --repo opensphere-platform/OpenSphere-shell-foundation --signer-workflow "$SIGNER_WORKFLOW" \
              --cert-oidc-issuer https://token.actions.githubusercontent.com --source-ref refs/heads/main \
              --deny-self-hosted-runners --predicate-type https://slsa.dev/provenance/v1 >/dev/null
            gh attestation verify "oci://$REGISTRY/$repository@$digest" --bundle-from-oci \
              --repo opensphere-platform/OpenSphere-shell-foundation --signer-workflow "$SIGNER_WORKFLOW" \
              --cert-oidc-issuer https://token.actions.githubusercontent.com --source-ref refs/heads/main \
              --deny-self-hosted-runners --predicate-type https://spdx.dev/Document/v2.3 >/dev/null
            jq --arg key "$key" --arg repository "$repository" --arg image "$REGISTRY/$repository@$digest" \
              --arg revision "$GITHUB_SHA" --arg role "$role" \
              '.components[$key]={repository:$repository,image:$image,sourceRevision:$revision,role:$role}' \
              "$RUNNER_TEMP/foundation-bom.json" > "$RUNNER_TEMP/foundation-bom.next.json"
            mv "$RUNNER_TEMP/foundation-bom.next.json" "$RUNNER_TEMP/foundation-bom.json"
          }

          verify_custom_image shell opensphere-shell-foundation "$SHELL_DIGEST" host
          verify_custom_image control-plane foundation-control-plane "$CONTROL_PLANE_DIGEST" control-plane
          while IFS=$'\t' read -r id image; do
            digest="$(crane digest "$REGISTRY/$image:$source_tag")"
            verify_custom_image "$id" "$image" "$digest" plugin
          done < <(jq -r '.plugins[] | [.id,("opensphere-plugin-" + .id)] | @tsv' plugins/catalog.json)

          samba_repo='opensphere-plugin-samba-ad'
          samba_digest="$(crane digest "$REGISTRY/$samba_repo:edge")"
          samba_revision="$(crane config "$REGISTRY/$samba_repo@$samba_digest" | jq -r '.config.Labels["io.opensphere.source-revision"] // "separately-governed"')"
          jq --arg repository "$samba_repo" --arg image "$REGISTRY/$samba_repo@$samba_digest" --arg revision "$samba_revision" \
            '.components["samba-ad"]={repository:$repository,image:$image,sourceRevision:$revision,role:"plugin",governance:"separate-signed-package"}' \
            "$RUNNER_TEMP/foundation-bom.json" > "$RUNNER_TEMP/foundation-bom.next.json"
          mv "$RUNNER_TEMP/foundation-bom.next.json" "$RUNNER_TEMP/foundation-bom.json"

          # Samba-AD is governed in its own signed package repository, so its
          # operand is not present in plugins/catalog.json. It is nevertheless
          # part of the installable Foundation release and must be digest-pinned
          # in the same BOM as the plugin package.
          samba_operand_repository='mirror/samba-domain'
          samba_operand_digest="$(crane digest "$REGISTRY/$samba_operand_repository:edge")"
          samba_operand_platforms="$(jq -c '.images[] | select(.name == "samba-domain") | .platforms' oci/mirrors.json)"
          test -n "$samba_operand_platforms"
          test "$samba_operand_platforms" != "null"
          jq --arg repository "$samba_operand_repository" \
            --arg image "$REGISTRY/$samba_operand_repository@$samba_operand_digest" \
            --argjson platforms "$samba_operand_platforms" \
            '.operands["samba-domain"]={repository:$repository,image:$image,channel:"edge",platforms:$platforms,governance:"samba-ad-separate-signed-package"}' \
            "$RUNNER_TEMP/foundation-bom.json" > "$RUNNER_TEMP/foundation-bom.next.json"
          mv "$RUNNER_TEMP/foundation-bom.next.json" "$RUNNER_TEMP/foundation-bom.json"

          while IFS= read -r operand; do
            name="${operand#mirror/}"; name="${name%:edge}"
            repository="mirror/$name"
            digest="$(crane digest "$REGISTRY/$repository:edge")"
            platforms="$(jq -c --arg name "$name" '.images[] | select(.name == $name) | (.platforms // ["linux/amd64","linux/arm64"])' oci/mirrors.json)"
            jq --arg key "$name" --arg repository "$repository" --arg image "$REGISTRY/$repository@$digest" --argjson platforms "$platforms" \
              '.operands[$key]={repository:$repository,image:$image,channel:"edge",platforms:$platforms}' \
              "$RUNNER_TEMP/foundation-bom.json" > "$RUNNER_TEMP/foundation-bom.next.json"
            mv "$RUNNER_TEMP/foundation-bom.next.json" "$RUNNER_TEMP/foundation-bom.json"
          done < <(jq -r '[.plugins[].operands[]] | unique[]' plugins/catalog.json)

          jq -e '.kind == "OpenSphereFoundationReleaseBOM" and .status == "Active" and
            (.components | length) == 23 and (.operands | length) == 29 and
            .components.shell.image and .components["control-plane"].image' \
            "$RUNNER_TEMP/foundation-bom.json" >/dev/null
          echo "anchor-digest=$SHELL_DIGEST" >> "$GITHUB_OUTPUT"
      - name: Attest signed Foundation Release BOM to the shell anchor
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/opensphere-shell-foundation
          subject-digest: ${{ steps.release.outputs.anchor-digest }}
          predicate-type: https://opensphere.io/attestations/foundation-release-bom/v1
          predicate-path: ${{ runner.temp }}/foundation-bom.json
          push-to-registry: true
      - name: Advance component edge tags with shell anchor last
        shell: bash
        run: |
          set -euo pipefail
          bom="$RUNNER_TEMP/foundation-bom.json"
          release_tag="$(jq -r '.releaseTag' "$bom")"
          [[ "$release_tag" =~ ^[0-9]{12}$ ]]
          publish_immutable_tag() {
            local reference="$1" repository digest existing
            repository="${reference%@*}"
            digest="${reference##*@}"
            existing="$(crane digest "$repository:$release_tag" 2>/dev/null || true)"
            if [[ -n "$existing" && "$existing" != "$digest" ]]; then
              echo "Immutable release tag collision: $repository:$release_tag is $existing, expected $digest" >&2
              exit 1
            fi
            crane tag "$reference" "$release_tag"
            test "$(crane digest "$repository:$release_tag")" = "$digest"
          }
          for key in $(jq -r '.components | keys[] | select(. != "shell" and . != "samba-ad")' "$bom"); do
            image="$(jq -r --arg key "$key" '.components[$key].image' "$bom")"
            publish_immutable_tag "$image"
            crane tag "$image" edge
          done
          anchor="$(jq -r '.components.shell.image' "$bom")"
          publish_immutable_tag "$anchor"
          crane tag "$anchor" edge
          for key in $(jq -r '.components | keys[] | select(. != "samba-ad")' "$bom"); do
            repository="$(jq -r --arg key "$key" '.components[$key].repository' "$bom")"
            expected="$(jq -r --arg key "$key" '.components[$key].image | split("@")[1]' "$bom")"
            test "$(crane digest "$REGISTRY/$repository:$release_tag")" = "$expected"
            test "$(crane digest "$REGISTRY/$repository:edge")" = "$expected"
          done
