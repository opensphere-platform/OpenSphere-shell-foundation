# Foundation control-plane core contracts.
# FoundationModel/Descriptor are cluster-scoped platform declarations;
# Claim/Binding are namespaced consumer contracts. Spec/status intentionally
# preserve engine-specific fields while keeping lifecycle fields typed.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: foundationmodels.foundation.opensphere.io
spec:
  group: foundation.opensphere.io
  scope: Cluster
  names:
    plural: foundationmodels
    singular: foundationmodel
    kind: FoundationModel
    shortNames: [fm]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      additionalPrinterColumns:
        - { name: Model, type: string, jsonPath: .spec.model }
        - { name: Desired, type: string, jsonPath: .spec.desiredState }
        - { name: Phase, type: string, jsonPath: .status.phase }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [model, desiredState]
              properties:
                model: { type: string }
                desiredState:
                  type: string
                  enum: [Installed, Disabled]
                parameters:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: foundationmoduledescriptors.foundation.opensphere.io
spec:
  group: foundation.opensphere.io
  scope: Cluster
  names:
    plural: foundationmoduledescriptors
    singular: foundationmoduledescriptor
    kind: FoundationModuleDescriptor
    shortNames: [fmd]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: foundationclaims.foundation.opensphere.io
spec:
  group: foundation.opensphere.io
  scope: Namespaced
  names:
    plural: foundationclaims
    singular: foundationclaim
    kind: FoundationClaim
    shortNames: [fc]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [model]
              properties:
                model: { type: string }
                parameters:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: foundationbindings.foundation.opensphere.io
spec:
  group: foundation.opensphere.io
  scope: Namespaced
  names:
    plural: foundationbindings
    singular: foundationbinding
    kind: FoundationBinding
    shortNames: [fb]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [claimRef, endpoint]
              properties:
                claimRef:
                  type: object
                  required: [name, namespace]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                endpoint: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
